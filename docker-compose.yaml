version: '2'

networks:
  treetracking:

services:
  orderer.treetracking.com:
    container_name: orderer.treetracking.com
    image: hyperledger/fabric-orderer:1.4.12
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_GENESISMETHOD=file
      - ORDERER_GENERAL_GENESISFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=false
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ./channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config/ordererOrganizations/treetracking.com/orderers/orderer.treetracking.com/msp:/var/hyperledger/orderer/msp
    ports:
      - 7050:7050
    networks:
      - treetracking

  peer0.admin.treetracking.com:
    container_name: peer0.admin.treetracking.com
    image: hyperledger/fabric-peer:1.4.12
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=treesystems_treetracking
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.admin.treetracking.com
      - CORE_PEER_ADDRESS=peer0.admin.treetracking.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.admin.treetracking.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.admin.treetracking.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.admin.treetracking.com:7051
      - CORE_PEER_LOCALMSPID=TreeTrackingAdminMSP
      - CORE_PEER_TLS_ENABLED=false
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - /var/run/:/host/var/run/
      - ./crypto-config/peerOrganizations/admin.treetracking.com/peers/peer0.admin.treetracking.com/msp:/etc/hyperledger/fabric/msp
    ports:
      - 7051:7051
    networks:
      - treetracking

  peer0.forestryauthority.treetracking.com:
    container_name: peer0.forestryauthority.treetracking.com
    image: hyperledger/fabric-peer:1.4.12
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=treesystems_treetracking
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.forestryauthority.treetracking.com
      - CORE_PEER_ADDRESS=peer0.forestryauthority.treetracking.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.forestryauthority.treetracking.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.forestryauthority.treetracking.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.forestryauthority.treetracking.com:9051
      - CORE_PEER_LOCALMSPID=ForestryAuthorityMSP
      - CORE_PEER_TLS_ENABLED=false
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - /var/run/:/host/var/run/
      - ./crypto-config/peerOrganizations/forestryauthority.treetracking.com/peers/peer0.forestryauthority.treetracking.com/msp:/etc/hyperledger/fabric/msp
    ports:
      - 9051:9051
    networks:
      - treetracking

  peer0.loggingcompany.treetracking.com:
    container_name: peer0.loggingcompany.treetracking.com
    image: hyperledger/fabric-peer:1.4.12
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=treesystems_treetracking
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.loggingcompany.treetracking.com
      - CORE_PEER_ADDRESS=peer0.loggingcompany.treetracking.com:11051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:11051
      - CORE_PEER_CHAINCODEADDRESS=peer0.loggingcompany.treetracking.com:11052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:11052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.loggingcompany.treetracking.com:11051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.loggingcompany.treetracking.com:11051
      - CORE_PEER_LOCALMSPID=LoggingCompaniesMSP
      - CORE_PEER_TLS_ENABLED=false
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - /var/run/:/host/var/run/
      - ./crypto-config/peerOrganizations/loggingcompany.treetracking.com/peers/peer0.loggingcompany.treetracking.com/msp:/etc/hyperledger/fabric/msp
    ports:
      - 11051:11051
    networks:
      - treetracking

  peer0.buyingcompany.treetracking.com:
    container_name: peer0.buyingcompany.treetracking.com
    image: hyperledger/fabric-peer:1.4.12
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=treesystems_treetracking
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=peer0.buyingcompany.treetracking.com
      - CORE_PEER_ADDRESS=peer0.buyingcompany.treetracking.com:13051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:13051
      - CORE_PEER_CHAINCODEADDRESS=peer0.buyingcompany.treetracking.com:13052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:13052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.buyingcompany.treetracking.com:13051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.buyingcompany.treetracking.com:13051
      - CORE_PEER_LOCALMSPID=BuyingCompaniesMSP
      - CORE_PEER_TLS_ENABLED=false
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - /var/run/:/host/var/run/
      - ./crypto-config/peerOrganizations/buyingcompany.treetracking.com/peers/peer0.buyingcompany.treetracking.com/msp:/etc/hyperledger/fabric/msp
    ports:
      - 13051:13051
    networks:
      - treetracking

  cli:
    container_name: cli
    image: hyperledger/fabric-tools:1.4.12
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.admin.treetracking.com:7051
      - CORE_PEER_LOCALMSPID=TreeTrackingAdminMSP
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/peerOrganizations/admin.treetracking.com/users/Admin@admin.treetracking.com/msp
      - CORE_CHAINCODE_KEEPALIVE=10
      - CORE_PEER_TLS_ENABLED=false
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/:/host/var/run/
      - ./crypto-config:/opt/gopath/src/github.com/hyperledger/fabric/peer/crypto/
      - ./channel-artifacts:/opt/gopath/src/github.com/hyperledger/fabric/peer/channel-artifacts
    networks:
      - treetracking
